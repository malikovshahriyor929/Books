services:
  - type: web
    name: booking-backend
    runtime: node
    rootDir: .
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_KEY
        sync: false
      - key: JWT_REFRESH_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: API_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_KEY
        sync: false
